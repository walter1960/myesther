<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>MyEsther 💬</title>
<meta name="description" content="MyEsther - Chat Sécurisé Zéro-Connaissance"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#7c3aed"/>

<!-- Préchargement de la police pour vitesse maximale -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>

<!-- Scripts chargés prioritairement -->
<script src="https://cdn.tailwindcss.com?plugins=forms" defer></script>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="js/urya_brain.js"></script>

<script>
  // Tailwind config AVANT le rendu
  window.tailwindConfig = {
    theme: {
      extend: {
        fontFamily: { sans: ['Nunito', 'sans-serif'] },
        colors: {
          brand: { DEFAULT: '#7c3aed', light: '#a78bfa', dark: '#5b21b6' }
        }
      }
    }
  };
</script>

<style>
  /* RESET : Force le fond blanc, texte sombre, police joyeuse */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: 'Nunito', sans-serif;
    background: #ffffff !important;
    color: #1a1a2e;
    overflow: hidden;
  }
  input, textarea { color: #1a1a2e !important; background: transparent; }
  input::placeholder { color: #9ca3af; }
  
  /* Fond joyeux : dégradé subtil en haut de page */
  .joy-bg {
    background: linear-gradient(160deg, #f5f3ff 0%, #fce7f3 40%, #eff6ff 100%);
    min-height: 100vh;
  }

  /* Bouton send */
  .btn-send {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    transition: all 0.2s ease;
  }
  .btn-send:active { transform: scale(0.93); }
  .btn-send:hover { box-shadow: 0 6px 26px rgba(124,58,237,0.6); }

  /* Bulles de messages */
  .bubble-sent {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    border-radius: 22px 22px 4px 22px;
    color: #fff;
  }
  .bubble-recv {
    background: #f3f4f6;
    border-radius: 22px 22px 22px 4px;
    color: #1a1a2e;
  }

  /* Barre du bas */
  .input-bar {
    background: #fff;
    border: 2px solid #ede9fe;
    border-radius: 28px;
    transition: border-color 0.2s;
  }
  .input-bar:focus-within { border-color: #7c3aed; }

  /* Zone principale du chat */
  #chat-canvas { overflow-y: auto; scroll-behavior: smooth; }
  #chat-canvas::-webkit-scrollbar { width: 4px; }
  #chat-canvas::-webkit-scrollbar-thumb { background: #e9d5ff; border-radius: 99px; }

  /* Panneau d'emojis */
  #emoji-panel {
    display: none;
    position: absolute;
    bottom: 80px;
    left: 12px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    border: 1px solid #ede9fe;
    padding: 12px;
    z-index: 100;
    max-width: 320px;
    animation: popIn 0.2s ease;
  }
  #emoji-panel.open { display: block; }
  @keyframes popIn {
    from { transform: scale(0.8) translateY(10px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }
  .emoji-btn { font-size: 1.6rem; cursor: pointer; padding: 6px; border-radius: 10px; transition: background 0.15s; }
  .emoji-btn:hover { background: #f3f4f6; }

  /* Sélecteur de thème couleur */
  .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform 0.2s, border-color 0.2s; }
  .color-dot:hover { transform: scale(1.2); }
  .color-dot.active { border-color: #1a1a2e; }

  /* Badge de connexion */
  .conn-badge { animation: fadeInDown 0.5s ease; }
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Bouton d'établissement de tunnel */
  .btn-tunnel {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: white;
    font-weight: 900;
    font-size: 1.1rem;
    padding: 18px;
    border-radius: 18px;
    width: 100%;
    border: none;
    cursor: pointer;
    box-shadow: 0 6px 30px rgba(124,58,237,0.35);
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-tunnel:hover { box-shadow: 0 10px 40px rgba(124,58,237,0.5); transform: translateY(-1px); }
  .btn-tunnel:active { transform: scale(0.97); }

  /* Input secret */
  .input-secret {
    width: 100%;
    background: #f9f5ff;
    border: 2px solid #ede9fe;
    border-radius: 16px;
    padding: 18px 52px 18px 20px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    transition: all 0.2s;
    outline: none;
    color: #1a1a2e !important;
  }
  .input-secret:focus { border-color: #7c3aed; box-shadow: 0 0 0 4px rgba(124,58,237,0.1); }

  /* Screen de chat */
  #chat-screen { display: none; height: 100vh; flex-direction: column; background: #fafafa; }
  #chat-screen.visible { display: flex; }

  /* Indicateur "en train de charger" */
  .loading-dots span {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #7c3aed;
    animation: dot-bounce 1.4s infinite ease-in-out;
  }
  .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
  .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
  @keyframes dot-bounce {
    0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<!-- ============================================================ -->
<!-- SETUP SCREEN                                                  -->
<!-- ============================================================ -->
<main id="setup-screen" class="joy-bg min-h-screen flex flex-col items-center justify-center px-6 py-10 relative">

  <!-- Bulles décoratives en fond -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
    <div class="absolute -top-20 -left-20 w-64 h-64 bg-purple-200/40 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-20 -right-20 w-80 h-80 bg-pink-200/40 rounded-full blur-3xl"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-blue-200/30 rounded-full blur-3xl"></div>
  </div>

  <div class="w-full max-w-sm relative z-10 space-y-8">
    
    <!-- Logo & Titre -->
    <div class="text-center space-y-3">
      <div class="inline-flex items-center justify-center w-24 h-24 bg-white rounded-3xl shadow-xl border border-purple-100 text-6xl mx-auto">
        💜
      </div>
      <h1 class="text-4xl font-black text-gray-900">MyEsther</h1>
      <p class="text-sm font-bold text-gray-400 tracking-widest uppercase" id="text-security">Chat Chiffré Zéro-Connaissance</p>
    </div>

    <!-- Formulaire -->
    <div class="bg-white rounded-3xl p-6 shadow-xl border border-purple-50 space-y-5">
      
      <div>
        <label class="block text-sm font-black text-gray-700 mb-2" id="text-secretlbl">Secret Partagé</label>
        <div class="relative">
          <input
            id="secret-input"
            type="password"
            class="input-secret"
            placeholder="Votre clé secrète..."
            autofocus
            autocomplete="off"
            autocapitalize="none"
          />
          <span class="absolute right-4 top-1/2 -translate-y-1/2 text-2xl pointer-events-none">🔑</span>
        </div>
        <p class="text-xs text-gray-400 font-semibold mt-2 ml-1">Les 2 personnes doivent saisir le même secret</p>
      </div>

      <button id="btn-establish" class="btn-tunnel" onclick="establishSecureTunnel()">
        <span id="btn-text">Etablir le Tunnel Sécurisé</span>
      </button>
    </div>

    <!-- Badges sécurité -->
    <div class="flex justify-center gap-5 text-xs font-black text-gray-400 uppercase tracking-wider">
      <span>AES-256</span>
      <span>P2P</span>
      <span>No-Logs</span>
    </div>

    <!-- Sélecteur de couleur / thème -->
    <div class="text-center space-y-3">
      <p class="text-xs font-black text-gray-400 uppercase tracking-widest">Personnaliser la couleur</p>
      <div class="flex justify-center gap-3" id="color-picker">
        <div class="color-dot active" style="background:#7c3aed" onclick="setTheme('#7c3aed','#a855f7','#f5f3ff')" title="💜 Violet"></div>
        <div class="color-dot" style="background:#ec4899" onclick="setTheme('#ec4899','#f472b6','#fce7f3')" title="🩷 Rose"></div>
        <div class="color-dot" style="background:#0ea5e9" onclick="setTheme('#0ea5e9','#38bdf8','#eff6ff')" title="🩵 Bleu"></div>
        <div class="color-dot" style="background:#10b981" onclick="setTheme('#10b981','#34d399','#ecfdf5')" title="💚 Vert"></div>
        <div class="color-dot" style="background:#f59e0b" onclick="setTheme('#f59e0b','#fbbf24','#fffbeb')" title="🌟 Or"></div>
        <div class="color-dot" style="background:#ff6b6b" onclick="setTheme('#ff6b6b','#ff8e8e','#fff0f0')" title="🧡 Corail"></div>
      </div>
    </div>

    <!-- Sélecteur de langue -->
    <div class="text-center">
      <button onclick="toggleLanguage()" class="text-xs font-black text-gray-400 uppercase tracking-widest hover:text-gray-700 transition-colors">
        🌍 <span id="lang-display">Français</span>
      </button>
    </div>
  </div>
</main>

<!-- ============================================================ -->
<!-- CHAT SCREEN                                                   -->
<!-- ============================================================ -->
<main id="chat-screen">
  
  <!-- TopBar -->
  <header class="flex items-center justify-between px-5 py-4 bg-white border-b border-gray-100 shadow-sm flex-shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-11 h-11 rounded-2xl flex items-center justify-center text-2xl shadow-sm border border-purple-50" id="chat-avatar" style="background:#f5f3ff">
        💬
      </div>
      <div>
        <h2 class="font-black text-gray-900 text-base">MyEsther Chat</h2>
        <div class="flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
          <span class="text-xs font-bold text-gray-400">Chiffrement actif</span>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <!-- Toggle langue -->
      <button onclick="toggleLanguage()" class="text-xs font-black bg-gray-100 hover:bg-gray-200 text-gray-500 px-3 py-2 rounded-xl transition-colors">
        <span id="lang-ind">FR</span>
      </button>
      <!-- Toggle thème (rapide) -->
      <button onclick="document.getElementById('theme-top').classList.toggle('hidden')" class="w-9 h-9 rounded-xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-base font-black text-gray-500 transition-colors">
        ◑
      </button>
      <!-- Toggle Notifications -->
      <button onclick="toggleNotifications()" id="notif-btn" class="w-9 h-9 rounded-xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-base font-black text-gray-400 transition-colors" title="Activer les notifications">
        🔔
      </button>
    </div>
  </header>

  <!-- Picker de thème dans le chat -->
  <div id="theme-top" class="hidden flex justify-center gap-2 py-2 bg-white border-b border-gray-50 px-4 flex-shrink-0">
    <div class="color-dot" style="background:#7c3aed" onclick="setTheme('#7c3aed','#a855f7','#f5f3ff')"></div>
    <div class="color-dot" style="background:#ec4899" onclick="setTheme('#ec4899','#f472b6','#fce7f3')"></div>
    <div class="color-dot" style="background:#0ea5e9" onclick="setTheme('#0ea5e9','#38bdf8','#eff6ff')"></div>
    <div class="color-dot" style="background:#10b981" onclick="setTheme('#10b981','#34d399','#ecfdf5')"></div>
    <div class="color-dot" style="background:#f59e0b" onclick="setTheme('#f59e0b','#fbbf24','#fffbeb')"></div>
    <div class="color-dot" style="background:#ff6b6b" onclick="setTheme('#ff6b6b','#ff8e8e','#fff0f0')"></div>
  </div>

  <!-- Zone de messages -->
  <section id="chat-canvas" class="flex-1 overflow-y-auto px-4 py-5 space-y-3">
    <!-- Message de bienvenue -->
    <div class="flex justify-center">
      <span class="text-xs font-black text-gray-400 uppercase tracking-widest bg-gray-100 px-4 py-2 rounded-full conn-badge">
        Tunnel Sécurisé Etabli
      </span>
    </div>

    <div class="flex flex-col items-start max-w-[82%] space-y-1">
      <div class="bubble-recv px-5 py-3">
        <p class="text-sm font-bold leading-relaxed">Bonjour ! Vous êtes connecté(e) en toute sécurité.</p>
      </div>
      <span class="text-[10px] text-gray-300 font-bold ml-1">Maintenant</span>
    </div>
  </section>

  <!-- ============================================================ -->
  <!-- Panneau d'emojis (style WhatsApp)                            -->
  <!-- ============================================================ -->
  <div id="emoji-panel" class="absolute bottom-[76px] left-4 right-4 max-w-sm">
    <div class="flex flex-wrap gap-1 max-h-52 overflow-y-auto custom-scroll" id="emoji-grid">
      <!-- Emojis injectés par JS -->
    </div>
  </div>

  <!-- Zone de saisie -->
  <footer class="flex-shrink-0 px-4 py-3 bg-white border-t border-gray-100 relative">
    <div class="flex items-center gap-3">
      
      <!-- Bouton emoji -->
      <button onclick="toggleEmojiPanel()" id="emoji-toggle-btn" class="w-11 h-11 rounded-2xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-2xl transition-all flex-shrink-0">
        😊
      </button>

      <!-- Champ de texte -->
      <div class="input-bar flex-1 flex items-center px-4 py-2.5 gap-2">
        <input
          id="chat-input"
          type="text"
          placeholder="Tape ton message..."
          class="flex-1 bg-transparent border-none outline-none text-base font-bold text-gray-900 placeholder-gray-400"
          style="color:#1a1a2e !important"
        />
      </div>

      <!-- Bouton envoyer -->
      <button onclick="sendSecureMessage()" class="btn-send w-11 h-11 rounded-2xl flex items-center justify-center text-white text-xl flex-shrink-0">
        ➤
      </button>
    </div>
  </footer>
</main>

<!-- ============================================================ -->
<!-- SCRIPTS                                                        -->
<!-- ============================================================ -->
<script>
  // === CACHE BREAKER : force le SW à se mettre à jour ===
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(reg => reg.update());
    });
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // === THÈME DYNAMIQUE ===
  let currentPrimary = localStorage.getItem('me_color') || '#7c3aed';
  let currentLight   = localStorage.getItem('me_light') || '#a855f7';
  let currentBg      = localStorage.getItem('me_bg')    || '#f5f3ff';

  function setTheme(primary, light, bg) {
    currentPrimary = primary; currentLight = light; currentBg = bg;
    localStorage.setItem('me_color', primary);
    localStorage.setItem('me_light', light);
    localStorage.setItem('me_bg', bg);
    applyTheme();
  }

  function applyTheme() {
    document.documentElement.style.setProperty('--brand', currentPrimary);
    // Mettre à jour les styles des éléments dynamiques
    document.querySelectorAll('.btn-tunnel, .btn-send').forEach(el => {
      el.style.background = `linear-gradient(135deg, ${currentPrimary}, ${currentLight})`;
      el.style.boxShadow = `0 6px 30px ${currentPrimary}55`;
    });
    document.querySelectorAll('.bubble-sent').forEach(el => {
      el.style.background = `linear-gradient(135deg, ${currentPrimary}, ${currentLight})`;
    });
    document.getElementById('chat-avatar').style.background = currentBg;
    // Meta theme-color
    document.querySelector('meta[name="theme-color"]').content = currentPrimary;
    // Setup screen bg 
    document.querySelector('.joy-bg')?.style && (document.querySelector('.joy-bg').style.background = 
      `linear-gradient(160deg, ${currentBg} 0%, #fce7f3 40%, #eff6ff 100%)`);
    // Dots actifs
    document.querySelectorAll('.color-dot').forEach(dot => {
      dot.classList.toggle('active', dot.style.background.includes(currentPrimary.replace('#','')));
    });
  }

  // === I18N ===
  let isEnglish = localStorage.getItem('me_lang') === 'en';
  const i18n = {
    fr: {
      secretLbl: '🗝️ Secret Partagé',
      btnText: 'Établir le Tunnel Sécurisé',
      placeholder: 'Votre clé secrète...',
      chatPlaceholder: 'Tape ton message...',
      lang: 'Français',
      langInd: 'FR'
    },
    en: {
      secretLbl: '🗝️ Shared Secret',
      btnText: 'Establish Secure Tunnel',
      placeholder: 'Your secret key...',
      chatPlaceholder: 'Type your message...',
      lang: 'English',
      langInd: 'EN'
    }
  };

  function toggleLanguage() {
    isEnglish = !isEnglish;
    localStorage.setItem('me_lang', isEnglish ? 'en' : 'fr');
    applyLanguage();
  }

  function applyLanguage() {
    const l = isEnglish ? i18n.en : i18n.fr;
    if (document.getElementById('text-secretlbl')) document.getElementById('text-secretlbl').textContent = l.secretLbl;
    if (document.getElementById('btn-text')) document.getElementById('btn-text').textContent = l.btnText;
    if (document.getElementById('secret-input')) document.getElementById('secret-input').placeholder = l.placeholder;
    if (document.getElementById('chat-input')) document.getElementById('chat-input').placeholder = l.chatPlaceholder;
    if (document.getElementById('lang-display')) document.getElementById('lang-display').textContent = l.lang;
    if (document.getElementById('lang-ind')) document.getElementById('lang-ind').textContent = l.langInd;
  }

  // === EMOJI PICKER ===
  const EMOJIS = [
    '😀','😂','🥰','😍','🤩','😎','😊','🥲','😢','😭',
    '😡','🤬','😱','🤯','🥳','🎉','❤️','💜','💚','💛',
    '🧡','💙','🖤','🤍','💔','💯','🔥','✨','🌟','⭐',
    '👍','👎','👋','🙏','🤝','💪','🫶','❤️‍🔥','💬','📩',
    '🔒','🔑','🛡️','🚀','🌈','🎵','🎶','🍕','🍦','🎂',
    '🐱','🐶','🦋','🌸','🌹','🌺','🌻','🏆','💎','🎯'
  ];

  function buildEmojiPanel() {
    const grid = document.getElementById('emoji-grid');
    grid.innerHTML = EMOJIS.map(e =>
      `<button class="emoji-btn" onclick="insertEmoji('${e}')" title="${e}">${e}</button>`
    ).join('');
  }

  function insertEmoji(emoji) {
    const input = document.getElementById('chat-input');
    const pos = input.selectionStart || input.value.length;
    input.value = input.value.slice(0, pos) + emoji + input.value.slice(pos);
    input.focus();
    input.selectionStart = input.selectionEnd = pos + emoji.length;
  }

  function toggleEmojiPanel() {
    const panel = document.getElementById('emoji-panel');
    panel.classList.toggle('open');
  }

  // Fermer le panel si on clique ailleurs
  document.addEventListener('click', (e) => {
    const panel = document.getElementById('emoji-panel');
    const btn = document.getElementById('emoji-toggle-btn');
    if (!panel.contains(e.target) && e.target !== btn) {
      panel.classList.remove('open');
    }
  });

  // === AFFICHAGE DES MESSAGES ===
  function appendMessage(text, type) {
    const canvas = document.getElementById('chat-canvas');
    const time = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
    const node = document.createElement('div');

    if (type === 'sent') {
      node.className = 'flex flex-col items-end self-end max-w-[82%] space-y-1';
      node.innerHTML = `
        <div class="bubble-sent px-5 py-3" style="background:linear-gradient(135deg,${currentPrimary},${currentLight})">
          <p class="text-sm font-bold leading-relaxed text-white">${text}</p>
        </div>
        <span class="text-[10px] text-gray-300 font-bold mr-1">${time}</span>`;
    } else {
      node.className = 'flex flex-col items-start max-w-[82%] space-y-1';
      node.innerHTML = `
        <div class="bubble-recv px-5 py-3">
          <p class="text-sm font-bold leading-relaxed text-gray-800">${text}</p>
        </div>
        <span class="text-[10px] text-gray-300 font-bold ml-1">${time}</span>`;
    }

    canvas.appendChild(node);
    canvas.scrollTop = canvas.scrollHeight;
  }

  // === PASSAGE AU CHAT ===
  // On écrase la fonction appendMessage et la transition dans urya_brain.js
  window.appendMessage = appendMessage;

  // Patch de la transition setup -> chat pour notre nouvelle UI
  const _original = window.establishSecureTunnel;
  window.establishSecureTunnel = async function() {
    const btn = document.getElementById('btn-establish');
    btn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';
    btn.disabled = true;
    await _original();
  };

  // Redéfinir la transition après connexion socket
  document.addEventListener('myesther:connected', () => {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('chat-screen').classList.add('visible');
    setTimeout(() => document.getElementById('chat-input')?.focus(), 300);
  });

  // === ENTER TO SEND ===
  document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('chat-input');
    if (input) {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendSecureMessage();
        }
      });
    }

    // === NOTIFICATIONS LOGIC ===
    let notifsEnabled = false;

    function toggleNotifications() {
      if (!("Notification" in window)) {
        alert("Ce navigateur ne supporte pas les notifications.");
        return;
      }

      if (Notification.permission === "granted") {
        notifsEnabled = !notifsEnabled;
        updateNotifUI();
      } else if (Notification.permission !== "denied") {
        Notification.requestPermission().then(permission => {
          if (permission === "granted") {
            notifsEnabled = true;
            updateNotifUI();
            new Notification("MyEsther", { body: "Notifications activées ! 🔒" });
          }
        });
      } else {
        alert("Notifications bloquées. Veuillez les activer dans les paramètres du navigateur.");
      }
    }

    function updateNotifUI() {
      const btn = document.getElementById('notif-btn');
      if (notifsEnabled) {
        btn.classList.remove('text-gray-400');
        btn.classList.add('text-brand');
        btn.textContent = '🔕';
        btn.title = "Désactiver les notifications";
      } else {
        btn.classList.remove('text-brand');
        btn.classList.add('text-gray-400');
        btn.textContent = '🔔';
        btn.title = "Activer les notifications";
      }
    }

    function playNotifSound() {
      // Synthétiseur de bip léger (très rapide, pas besoin de fichier audio externe)
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // Note A5
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.1);
      } catch(e) { console.log("Audio not allowed yet"); }
    }

    window.pushNotification = function(text) {
      if (notifsEnabled && document.visibilityState !== 'visible') {
        new Notification("MyEsther", {
          body: "Nouveau message sécurisé reçu 🔒",
          icon: "/manifest.json" // Utilise l'icône de l'app si possible
        });
      }
      if (notifsEnabled) playNotifSound();
    };

    // Init
    buildEmojiPanel();
    applyTheme();
    applyLanguage();
  });
</script>
</body>
</html>
